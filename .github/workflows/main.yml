name: Build Android AAB Signed

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      # 🔥 FIX JAVA 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 🔥 GERAR KEYSTORE AUTOMÁTICO
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore android/app/upload-keystore.jks \
          -storepass 12345678 \
          -keypass 12345678 \
          -alias upload \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=App,O=App,L=SP,S=SP,C=BR"

      # 🔥 BUILD ASSINADO
      - name: Build AAB Signed
        run: |
          cd android
          ./gradlew bundleRelease \
          -Pandroid.injected.signing.store.file=app/upload-keystore.jks \
          -Pandroid.injected.signing.store.password=12345678 \
          -Pandroid.injected.signing.key.alias=upload \
          -Pandroid.injected.signing.key.password=12345678

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/bundle/release/*.aab
