name: Build Signed AAB Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run build
      - run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 🔥 GERA CHAVE DENTRO DO GITHUB (SEM CMD)
      - name: Generate Keystore
        run: |
          keytool -genkey -v \
          -keystore android/app/upload-keystore.jks \
          -alias upload \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass 123456 \
          -keypass 123456 \
          -dname "CN=App, OU=Dev, O=Company, L=City, S=State, C=BR"

      # 🔥 CONFIGURA ASSINATURA
      - name: Create keystore properties
        run: |
          echo "storeFile=upload-keystore.jks" > android/keystore.properties
          echo "storePassword=123456" >> android/keystore.properties
          echo "keyAlias=upload" >> android/keystore.properties
          echo "keyPassword=123456" >> android/keystore.properties

      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/bundle/release/*.aab
