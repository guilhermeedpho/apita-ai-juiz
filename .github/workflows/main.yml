name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 🔥 Node correto (Capacitor precisa)
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      # 🔥 ESSA É A CORREÇÃO DO SEU ERRO ATUAL
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      # 🔥 ANDROID BUILD TOOLS
      - name: Setup Android
        uses: android-actions/setup-android@v3

      # 🔥 SYNC CAPACITOR
      - name: Sync Capacitor
        run: npx cap sync android

      # 🔥 BUILD AAB
      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease

      # 🔥 SALVAR ARQUIVO FINAL
      - name: Upload AAB
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: android/app/build/outputs/bundle/release/app-release.aab
