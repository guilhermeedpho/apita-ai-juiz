name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore my-release-key.jks -storepass 123456 -alias my-key-alias -keypass 123456 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=App, OU=Dev, O=Company, L=City, S=State, C=BR"

      - name: Create keystore properties
        run: |
          echo "storeFile=my-release-key.jks" > android/keystore.properties
          echo "storePassword=123456" >> android/keystore.properties
          echo "keyAlias=my-key-alias" >> android/keystore.properties
          echo "keyPassword=123456" >> android/keystore.properties

      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/bundle/release/app-release.aab
